<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Somvisual Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #425af5;
            --primary-dark: #2f44d3;
            --error: #ef4444;
            --glass: rgba(255, 255, 255, 0.85);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Responsive Background Shapes */
        .shape { position: absolute; filter: blur(60px); z-index: 0; border-radius: 50%; opacity: 0.6; }
        .shape-1 { width: 30vw; height: 30vw; background: var(--primary); top: -10%; left: -10%; }
        .shape-2 { width: 25vw; height: 25vw; background: #818cf8; bottom: -5%; right: 5%; }

        /* Login Card */
        .glass-card {
            position: relative;
            z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            width: 90%;
            max-width: 400px;
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            text-align: center;
            box-sizing: border-box;
        }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        h1 { font-size: 1.75rem; color: #1e293b; margin: 0 0 0.5rem; font-weight: 700; }
        p { color: #64748b; font-size: 0.95rem; margin-bottom: 2rem; }

        .input-group { text-align: left; margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.8rem; font-weight: 600; color: #475569; margin-bottom: 0.5rem; padding-left: 0.2rem; }

        input {
            width: 100%; padding: 0.9rem 1.1rem; border-radius: 14px; border: 1px solid #e2e8f0;
            background: white; font-size: 1rem; box-sizing: border-box; outline: none; transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(66, 90, 245, 0.1); }

        .btn-login {
            width: 100%; padding: 1rem; background: var(--primary); color: white; border: none;
            border-radius: 14px; font-size: 1rem; font-weight: 600; cursor: pointer;
            transition: all 0.3s; box-shadow: 0 10px 15px -3px rgba(66, 90, 245, 0.3); margin-top: 0.5rem;
        }

        .btn-login:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-login:active { transform: translateY(0); }

        /* Custom Toast Notification */
        #toast {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            font-size: 0.9rem;
            width: max-content;
            max-width: 85vw;
        }

        #toast.show { top: 20px; }

        @media (max-width: 400px) {
            .glass-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="shape shape-1"></div>
<div class="shape shape-2"></div>

<div id="toast">
    <div style="background: var(--error); width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold;">!</div>
    <span id="toast-message">Error Message</span>
</div>

<div class="glass-card" id="loginCard">
    <h1>Somvisual</h1>
    <p>Student Portal Login</p>

    <div class="input-group">
        <label>User ID</label>
        <input type="text" id="userID" placeholder="Enter ID">
    </div>

    <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="First 3 digits of phone">
    </div>

    <button class="btn-login" id="loginBtn" onclick="login()">Sign In</button>
</div>

<script>
    const sheetID = "1JzkdWAJ-CL2z9vh87LuSrpvfiNVZboY3ITvrWRd6F2U";
    const apiKey = "AIzaSyDjpG6AZzXMeFhPf5ZSBJOvm4WthT-7TD8";
    const sheetName = "Students";
    const range = sheetName + "!A1:Z1000";

    function showToast(msg) {
        const toast = document.getElementById("toast");
        const card = document.getElementById("loginCard");
        document.getElementById("toast-message").innerText = msg;
        toast.classList.add("show");
        card.classList.add("shake");
        setTimeout(() => {
            toast.classList.remove("show");
            card.classList.remove("shake");
        }, 3000);
    }

    async function login(){
        const idInput = document.getElementById("userID").value.trim();
        const passInput = document.getElementById("password").value.trim();
        const btn = document.getElementById("loginBtn");

        if(!idInput || !passInput){
            showToast("Required fields are empty");
            return;
        }

        btn.innerText = "Authenticating...";
        btn.disabled = true;

        try {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetID}/values/${range}?key=${apiKey}`;
            const response = await fetch(url);
            const data = await response.json();
            const rows = data.values;
            let userData = null;

            for(let i=2; i<rows.length; i++){
                const rowID = rows[i][0]?.toString().trim();
                const rowPhone = rows[i][2]?.toString().trim();
                if(rowID === idInput && rowPhone.substring(0,3) === passInput){
                    userData = rows[i];
                    break;
                }
            }

            if(userData){
                localStorage.setItem("loggedUser", JSON.stringify(userData));
                window.location.href = "dashboard.html";
            } else {
                showToast("Invalid ID or Password");
                btn.innerText = "Sign In";
                btn.disabled = false;
            }
        } catch(e) {
            showToast("Server Error");
            btn.innerText = "Sign In";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
